<!DOCTYPE html>
<html>
<head>
    <title>Price Display Test</title>
</head>
<body>
    <h1>Price Display Testing</h1>
    <script>
        // Test the price formatting logic
        function formatPrice(price) {
            return parseFloat(price || 0) === 0 || price === 'Free' || price === 'free' 
                ? 'Free' 
                : `$${parseFloat(price).toFixed(2)}`;
        }

        // Test cases
        const testCases = [
            { price: 0, expected: 'Free' },
            { price: '0', expected: 'Free' },
            { price: 0.00, expected: 'Free' },
            { price: '0.00', expected: 'Free' },
            { price: null, expected: 'Free' },
            { price: undefined, expected: 'Free' },
            { price: '', expected: 'Free' },
            { price: 'Free', expected: 'Free' },
            { price: 'free', expected: 'Free' },
            { price: 29.99, expected: '$29.99' },
            { price: '29.99', expected: '$29.99' },
            { price: 100, expected: '$100.00' },
        ];

        console.log('Testing price formatting:');
        testCases.forEach(test => {
            const result = formatPrice(test.price);
            const passed = result === test.expected;
            console.log(`Input: ${test.price} → Output: ${result} (Expected: ${test.expected}) ${passed ? '✅' : '❌'}`);
        });
    </script>
</body>
</html>
