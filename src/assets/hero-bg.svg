<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Floating circles - top left -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)" filter="url(#blur)"/>
  <circle cx="150" cy="150" r="50" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  
  <!-- Floating circles - top right -->
  <circle cx="1100" cy="80" r="100" fill="rgba(102,126,234,0.08)" filter="url(#blur)"/>
  <circle cx="1050" cy="180" r="60" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>
  
  <!-- Floating circles - bottom left -->
  <circle cx="80" cy="700" r="90" fill="rgba(255,255,255,0.07)" filter="url(#blur)"/>
  <circle cx="180" cy="750" r="55" fill="rgba(102,126,234,0.06)" filter="url(#blur)"/>
  
  <!-- Floating circles - bottom right -->
  <circle cx="1120" cy="720" r="85" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>
  <circle cx="1000" cy="750" r="45" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  
  <!-- Abstract geometric shapes -->
  <g opacity="0.08" fill="white">
    <!-- Top left corner design -->
    <path d="M 0 0 L 200 0 L 200 150 Q 100 200 0 150 Z"/>
    
    <!-- Top right corner design -->
    <path d="M 1200 0 L 1000 0 Q 1050 100 1000 200 L 1200 150 Z"/>
    
    <!-- Bottom left accent -->
    <rect x="0" y="650" width="250" height="150" fill="none" stroke="white" stroke-width="2" opacity="0.06"/>
    
    <!-- Bottom right accent -->
    <circle cx="1050" cy="750" r="120" fill="none" stroke="white" stroke-width="2" opacity="0.06"/>
  </g>
  
  <!-- Book icons (educational theme) -->
  <g opacity="0.05">
    <!-- Book 1 (top left area) -->
    <rect x="200" y="120" width="40" height="50" fill="white"/>
    <line x1="220" y1="120" x2="220" y2="170" stroke="white" stroke-width="1"/>
    
    <!-- Book 2 (right side) -->
    <rect x="1050" y="200" width="35" height="45" fill="white"/>
    <line x1="1068" y1="200" x2="1068" y2="245" stroke="white" stroke-width="1"/>
    
    <!-- Book 3 (bottom area) -->
    <rect x="300" y="680" width="38" height="48" fill="white"/>
    <line x1="319" y1="680" x2="319" y2="728" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Graduation cap accents -->
  <g opacity="0.04">
    <!-- Cap 1 -->
    <rect x="150" y="600" width="50" height="5" fill="white"/>
    <polygon points="175,600 160,580 190,580" fill="white"/>
    
    <!-- Cap 2 -->
    <rect x="950" y="450" width="48" height="5" fill="white"/>
    <polygon points="974,450 960,432 988,432" fill="white"/>
  </g>
  
  <!-- Subtle grid pattern -->
  <g stroke="white" stroke-width="1" opacity="0.03">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
  </g>
  
  <!-- Decorative corner elements -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.06">
    <!-- Top left corner -->
    <path d="M 20 20 L 80 20 M 20 20 L 20 80"/>
    
    <!-- Top right corner -->
    <path d="M 1180 20 L 1120 20 M 1180 20 L 1180 80"/>
    
    <!-- Bottom left corner -->
    <path d="M 20 780 L 80 780 M 20 780 L 20 720"/>
    
    <!-- Bottom right corner -->
    <path d="M 1180 780 L 1120 780 M 1180 780 L 1180 720"/>
  </g>
</svg>
