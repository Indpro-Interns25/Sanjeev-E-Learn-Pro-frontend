<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main background gradient: deep ocean blue to dark violet -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="40%"  stop-color="#1a1a6e"/>
      <stop offset="70%"  stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>

    <!-- Glow for nodes -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6ee7f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6ee7f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- Big soft spotlight behind the center text area -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filter for glow circles -->
    <filter id="blur4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="blur20" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="blur50" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50"/>
    </filter>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1440" height="900" fill="url(#skyGrad)"/>

  <!-- ── LARGE SOFT LIGHT BLOBS ── -->
  <circle cx="300"  cy="200" r="320" fill="url(#glow2)" filter="url(#blur50)"/>
  <circle cx="1150" cy="700" r="280" fill="url(#glow3)" filter="url(#blur50)"/>
  <circle cx="720"  cy="450" r="400" fill="url(#spotlight)" filter="url(#blur50)"/>
  <circle cx="1100" cy="150" r="200" fill="url(#glow1)" filter="url(#blur50)"/>

  <!-- ── NETWORK / CIRCUIT LINES ── -->
  <g stroke="#6ee7f7" stroke-width="0.8" opacity="0.18">
    <!-- horizontal threads -->
    <line x1="0"    y1="160" x2="460"  y2="160"/>
    <line x1="980"  y1="160" x2="1440" y2="160"/>
    <line x1="0"    y1="340" x2="300"  y2="340"/>
    <line x1="620"  y1="340" x2="900"  y2="340"/>
    <line x1="1200" y1="340" x2="1440" y2="340"/>
    <line x1="0"    y1="560" x2="520"  y2="560"/>
    <line x1="900"  y1="560" x2="1440" y2="560"/>
    <line x1="0"    y1="740" x2="380"  y2="740"/>
    <line x1="1060" y1="740" x2="1440" y2="740"/>

    <!-- vertical threads -->
    <line x1="140"  y1="0"   x2="140"  y2="420"/>
    <line x1="140"  y1="600" x2="140"  y2="900"/>
    <line x1="460"  y1="0"   x2="460"  y2="280"/>
    <line x1="720"  y1="0"   x2="720"  y2="200"/>
    <line x1="720"  y1="640" x2="720"  y2="900"/>
    <line x1="980"  y1="0"   x2="980"  y2="260"/>
    <line x1="980"  y1="620" x2="980"  y2="900"/>
    <line x1="1300" y1="0"   x2="1300" y2="480"/>
    <line x1="1300" y1="700" x2="1300" y2="900"/>

    <!-- diagonal threads -->
    <line x1="0"    y1="0"   x2="360"  y2="360"/>
    <line x1="0"    y1="900" x2="400"  y2="500"/>
    <line x1="1440" y1="0"   x2="1080" y2="360"/>
    <line x1="1440" y1="900" x2="1040" y2="560"/>
    <line x1="460"  y1="160" x2="720"  y2="340"/>
    <line x1="980"  y1="160" x2="720"  y2="340"/>
    <line x1="300"  y1="340" x2="460"  y2="560"/>
    <line x1="1200" y1="340" x2="980"  y2="560"/>
  </g>

  <!-- ── NODE DOTS ── -->
  <g fill="#6ee7f7" opacity="0.5">
    <circle cx="140"  cy="160" r="4" filter="url(#blur4)"/>
    <circle cx="460"  cy="160" r="3"/>
    <circle cx="980"  cy="160" r="3"/>
    <circle cx="1300" cy="160" r="4" filter="url(#blur4)"/>
    <circle cx="140"  cy="340" r="3"/>
    <circle cx="300"  cy="340" r="5" filter="url(#blur4)"/>
    <circle cx="620"  cy="340" r="3"/>
    <circle cx="720"  cy="340" r="5" filter="url(#blur4)"/>
    <circle cx="900"  cy="340" r="3"/>
    <circle cx="1200" cy="340" r="4" filter="url(#blur4)"/>
    <circle cx="460"  cy="560" r="3"/>
    <circle cx="520"  cy="560" r="4" filter="url(#blur4)"/>
    <circle cx="900"  cy="560" r="4" filter="url(#blur4)"/>
    <circle cx="980"  cy="560" r="3"/>
    <circle cx="140"  cy="740" r="4" filter="url(#blur4)"/>
    <circle cx="380"  cy="740" r="3"/>
    <circle cx="1060" cy="740" r="3"/>
    <circle cx="1300" cy="740" r="4" filter="url(#blur4)"/>
  </g>

  <!-- ── GLOWING ACCENT CIRCLES ── -->
  <circle cx="300"  cy="340" r="30" fill="#a78bfa" fill-opacity="0.12" filter="url(#blur20)"/>
  <circle cx="720"  cy="340" r="50" fill="#6ee7f7" fill-opacity="0.10" filter="url(#blur20)"/>
  <circle cx="1200" cy="340" r="35" fill="#34d399" fill-opacity="0.12" filter="url(#blur20)"/>
  <circle cx="520"  cy="560" r="40" fill="#a78bfa" fill-opacity="0.10" filter="url(#blur20)"/>
  <circle cx="900"  cy="560" r="35" fill="#6ee7f7" fill-opacity="0.10" filter="url(#blur20)"/>

  <!-- ── FLOATING EDUCATION ICONS ── -->
  <!-- Graduation cap (top-left) -->
  <g transform="translate(110,55) rotate(-10)" opacity="0.22" fill="white">
    <rect x="0" y="14" width="44" height="6" rx="2"/>
    <polygon points="22,0 0,14 44,14"/>
    <line x1="36" y1="14" x2="40" y2="30" stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="40" cy="31" r="3"/>
  </g>

  <!-- Book stack (right side) -->
  <g transform="translate(1300,220)" opacity="0.18" fill="white">
    <rect x="0"  y="30" width="50" height="9"  rx="2"/>
    <rect x="3"  y="18" width="47" height="9"  rx="2"/>
    <rect x="6"  y="6"  width="44" height="9"  rx="2"/>
    <line x1="16" y1="6"  x2="16" y2="48"  stroke="#0f0c29" stroke-width="1.5"/>
    <line x1="13" y1="18" x2="13" y2="39"  stroke="#0f0c29" stroke-width="1.5"/>
  </g>

  <!-- Lightbulb (top-right area) -->
  <g transform="translate(1100,60)" opacity="0.20" fill="white">
    <circle cx="20" cy="18" r="14"/>
    <rect x="12" y="32" width="16" height="5" rx="2"/>
    <rect x="14" y="38" width="12" height="4" rx="2"/>
    <line x1="20" y1="0"  x2="20" y2="-6"   stroke="white" stroke-width="2"/>
    <line x1="34" y1="4"  x2="38" y2="0"    stroke="white" stroke-width="2"/>
    <line x1="6"  y1="4"  x2="2"  y2="0"    stroke="white" stroke-width="2"/>
    <line x1="38" y1="18" x2="44" y2="18"   stroke="white" stroke-width="2"/>
    <line x1="0"  y1="18" x2="-6" y2="18"   stroke="white" stroke-width="2"/>
  </g>

  <!-- Pencil (bottom-left) -->
  <g transform="translate(80,780) rotate(-30)" opacity="0.18" fill="white">
    <rect x="0" y="0" width="8" height="44" rx="2"/>
    <polygon points="0,44 8,44 4,54"/>
    <rect x="0" y="0" width="8" height="7" rx="1" fill="#f87171"/>
  </g>

  <!-- Certificate ribbon (bottom-right) -->
  <g transform="translate(1340,820)" opacity="0.16" fill="white">
    <rect x="0" y="-40" width="40" height="30" rx="3"/>
    <line x1="10" y1="-34" x2="30" y2="-34" stroke="#0f0c29" stroke-width="1.5"/>
    <line x1="10" y1="-26" x2="30" y2="-26" stroke="#0f0c29" stroke-width="1.5"/>
    <circle cx="20" cy="-2" r="8"/>
    <polygon points="20,-10 22,8 20,5 18,8"/>
  </g>

  <!-- ── STAR / PARTICLE FIELD ── -->
  <g fill="white">
    <circle cx="60"   cy="30"  r="1.2" opacity="0.4"/>
    <circle cx="200"  cy="80"  r="1"   opacity="0.3"/>
    <circle cx="540"  cy="50"  r="1.5" opacity="0.35"/>
    <circle cx="820"  cy="20"  r="1"   opacity="0.3"/>
    <circle cx="1050" cy="70"  r="1.3" opacity="0.4"/>
    <circle cx="1380" cy="40"  r="1"   opacity="0.35"/>
    <circle cx="30"   cy="400" r="1.2" opacity="0.3"/>
    <circle cx="700"  cy="800" r="1"   opacity="0.3"/>
    <circle cx="1420" cy="500" r="1.2" opacity="0.35"/>
    <circle cx="400"  cy="860" r="1"   opacity="0.3"/>
    <circle cx="870"  cy="880" r="1.3" opacity="0.35"/>
    <circle cx="1200" cy="870" r="1"   opacity="0.3"/>
  </g>

  <!-- ── BOTTOM WAVE SHAPE ── -->
  <path d="M0 820 Q180 760 360 820 Q540 880 720 820 Q900 760 1080 820 Q1260 880 1440 820 L1440 900 L0 900 Z"
        fill="white" fill-opacity="0.04"/>
</svg>
